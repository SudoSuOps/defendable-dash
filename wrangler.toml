name = "defendable-dash"
compatibility_date = "2026-05-28"
# next-on-pages workers need Node APIs at runtime.
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
NEXT_PUBLIC_SITE_URL = "https://defendabledash.com"
DEFENDABLE_CLOUD_API_BASE = "https://api.defendablecloud.com"
# Router fleet tier: sovereign router on the rig, exposed read-only + path-restricted
# (/admin /receipts /health only) via a gated Cloudflare Tunnel.
DEFENDABLE_ROUTER_API_BASE = "https://dash-router.quantumrails.io"
# DEFENDABLE_ROUTER_TOKEN is an encrypted secret (the router read-token):
#   echo -n "<token>" | wrangler pages secret put DEFENDABLE_ROUTER_TOKEN --project-name=defendable-dash
# Member JWT is supplied per-request from the signed-in session cookie (never a build var).
